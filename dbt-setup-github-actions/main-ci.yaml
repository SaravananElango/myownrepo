name: Main CI

# Queues workflow runs, i.e. such that we don't run multiple workflow runs
# concurrently
concurrency: main_ci

on:
  workflow_dispatch:
    inputs:
      model_selection:
        type: choice
        description: Choose which set of data models dbt should run
        required: true
        options:
        - daily
        - weekly
        - monthly
        - all_excluding_monthly
  schedule:
  - cron: "0 3 * * 1" # Monday 5:00 AM
  - cron: "0 4 * * *" # Daily  6:00 AM
  - cron: "0 0 1 * *" # Monthly
  push:
    branches: [ main ]

env:
  PROD: prod
  #TEST: test
  DBT_PROFILES_DIR: /home/runner/.dbt

jobs:
  check_dbt_changes:
    runs-on: ubuntu-latest
    # Set job outputs to value from filter step. This will either be 'true' or
    # 'false' depending on whether any dbt related files have changed
    outputs:
      has_dbt_changes: ${{ steps.filter.outputs.dbt }}
    steps:
    - if: github.event_name == 'push'
      name: Check out source repository
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        ref: main
        fetch-depth: 2

    - if: github.event_name == 'push'
      name: Get commit SHA of HEAD^1
      run: |
        echo "COMMIT_SHA_HEAD_1=$(git rev-parse HEAD^1)" >> $GITHUB_ENV

    - if: github.event_name == 'push'
      uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2.11.12
      id: filter
      # This will check if any files (matching `filters`) have changed between
      # `main` and the second to last commit on `main` (obtained through
      # `HEAD^1` in the previous step)
      with:
        ref: main
        base: ${{ env.COMMIT_SHA_HEAD_1 }}
        filters: |
          dbt:
            - 'temp_dbt/**'
            - 'requirements-dbt.txt'

  run_dbt:
    needs: [ check_dbt_changes ]
    # Only run this job if the trigger event is not push (in which case it must
    # be scheduled) OR in case it is push then only run it if any have dbt
    # related files have changed.
    if: github.event_name != 'push' || needs.check_dbt_changes.outputs.has_dbt_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Checking out main branch and test the data on TEST environment first
    # and if it's ok, we run on PROD.
    steps:
    - name: Check out code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        ref: main

    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.12'

    - name: Setup dbt
      uses: ./.github/actions/dbt_setup
      with:
        dbt_profiles_dir: ${{ env.DBT_PROFILES_DIR }}

    - name: Determine dbt selector
      run: |
        selector="${{
          (
            github.event.schedule == '0 4 * * *'
            || github.event.inputs.model_selection == 'daily'
            || (
              github.event_name == 'workflow_dispatch'
              && github.event.inputs.model_selection == 'daily'
            )
          )
          && 'daily'
          || (
            github.event.schedule == '0 3 * * 1'
            || github.event.inputs.model_selection == 'weekly'
            || (
              github.event_name == 'workflow_dispatch'
              && github.event.inputs.model_selection == 'weekly'
            )
          )
          && 'weekly'
           || (
            github.event.schedule == '0 0 1 * *'
            || github.event.inputs.model_selection == 'monthly'
            || (
              github.event_name == 'workflow_dispatch'
              && github.event.inputs.model_selection == 'monthly'
            )
          )
          && 'monthly'
          || (
            github.event_name == 'workflow_dispatch'
            || github.event.inputs.model_selection == 'monthly'
          )
          && 'monthly'
          || (
            github.event_name == 'push'
            || github.event.inputs.model_selection == 'all_excluding_monthly'
          )
          && 'full'
          || ''
        }}"
        if [ "$selector" == "" ]; then
          # NOTE: we should NOT get here!
          exit 1
        fi
        echo "DBT_SELECTOR=$selector" >> $GITHUB_ENV

    - name: Run on Prod
      uses: ./.github/actions/dbt_select_type_of_run
      with:
        dbt_selector: ${{ env.DBT_SELECTOR }}
        env: "${{ env.PROD }}"
        service_account: ${{ secrets.PROD_SA }}
        workload_identity_provider: ${{ secrets.PROD_WIP }}
        slack_notification: ${{ secrets.SLACK_NOTIFICATIONS }}

    ##########################################################################
    # Upload dbt artifacts
    ##########################################################################
    - if: always()
      name: Upload dbt artifacts as GitHub Actions Artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      # If directory does not (yet) exist, warning is raised (not an error!)
      with:
        name: dbt-artifacts
        pathh: temp_dbt/target

    ##########################################################################
    # Upload dbt artifacts logs
    ##########################################################################
    - if: always()
      name: Upload dbt log as GitHub Actions Artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      # If directory does not (yet) exist, warning is raised (not an error!)
      with:
        name: dbt-log
        path: temp_dbt/logs/dbt.log
