name: Develop CI

# Queues workflow runs, i.e. such that we don't run multiple workflow runs
# concurrently. In GHA this shows up as the status `pending` (not `queued`)
# I believe GHA groups workflow runs by the concurrency string ID given below
# So we should only use this for the workflow we want to queue, e.g. in this
# case `develop_ci`
concurrency: develop_ci

env:
  ENV: dev
  DBT_PROFILES_DIR: /home/runner/.dbt
  GCP_PROJECT_NAME: XXXXXX

on:
  workflow_dispatch:
    inputs:
      model_selection:
        type: choice
        description: Choose which set of data models dbt should run
        required: true
        options:
          - daily
          - weekly
          - monthly
  push:
    branches: [ develop ]

jobs:
  check_dbt_changes:
    runs-on: ubuntu-latest
    # Set job outputs to values from filter step
    outputs:
      has_dbt_changes: ${{ steps.filter.outputs.dbt }}
      tf_changes: ${{ steps.terraform-files.outputs.any_changed }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: develop

      - name: Get terraform files
        id: terraform-files
        uses: tj-actions/changed-files@ed68ef82c095e0d48ec87eccea555d944a631a4c # v46.0.5
        with:
          files: |
            **/*.tfvars
            **/*.tf

      - uses: dorny/paths-filter@4512585405083f25c027a35db413c2b3b9006d50 # v2.11.12
        id: filter
        # To be safe it is better to compare `develop` against `main` rather
        # than the previous commit on `develop` (using `HEAD^1`) because it can
        # happen that on a commit to `develop` (containing some dbt changes)
        # CI fails. Why does that matter:
        # Because the next commit after the failed one would compare to the
        # failed commit when using `HEAD^1` and it most likely won't include the
        # code changes that caused the failure. So if for this 'next' commit CI
        # passes we could be silently merging buggy code to `main`, no bueno
        #
        # Instead of comparing to `main` might rather compare to the last commit
        # on `develop` with a successful CI run
        # TODO: investigate/implement the above
        with:
          ref: develop
          base: main
          filters: |
            dbt:
              - 'temp_dbt/**'
              - 'requirements-dbt.txt'

  run_dbt:
    needs: [ check_dbt_changes ]
    if: needs.check_dbt_changes.outputs.has_dbt_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: develop

      - name: Set workflow's environment variables
        run: |
          echo "develop_branch_dir=$GITHUB_WORKSPACE/_develop_branch" >> $GITHUB_ENV
          echo "dbt_project_dir=$GITHUB_WORKSPACE/temp_dbt" >> $GITHUB_ENV

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Setup dbt
        uses: ./.github/actions/dbt_setup
        with:
          dbt_profiles_dir: ${{ env.DBT_PROFILES_DIR }}

      - name: Authenticate
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.DEV_WIP }}
          service_account: ${{ secrets.DEV_SA }}

      - name: Checkout `main` and run `dbt compile`
        id: dbt_compile_main
        uses: ./.github/actions/dbt_checkout_and_compile
        with:
          env: ${{ env.ENV }}
          branch_name: main
          checkout_dir: ${{ env.develop_branch_dir }}

      # Only run dbt if any file dbt related file has changed
      - name: Run dbt
        uses: ./.github/actions/dbt_run_and_test
        id: run_dbt
        with:
          env: "${{ env.ENV }}"
          # `github.event.inputs.model_selection` will be empty when workflow is _not_ run through `workflow_dispatch`
          update_freq: "${{ github.event.inputs.model_selection }}"
          dbt_target_dir_path: ${{ steps.dbt_compile_main.outputs.dbt_target_dir_path }}


      - if: steps.run_dbt.outcome == 'success'
        name: Update docs
        uses: ./.github/actions/update_documentation
        with:
          gh_key: ${{ secrets.GITHUB_TOKEN }}
          gh_username: ${{ secrets.GH_COMMIT_USERNAME }}
          gh_email: ${{ secrets.GH_COMMIT_EMAIL }}
          env: "${{ env.ENV }}"

      ##########################################################################
      # Upload dbt artifacts
      ##########################################################################
      - if: always()
        name: Upload dbt artifacts as GitHub Actions Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        # If directory does not (yet) exist, warning is raised (not an error!)
        with:
          name: dbt-artifacts
          path: temp_dbt/target

      ##########################################################################
      # Slack Notification
      ##########################################################################
      - if: failure() && steps.run_dbt.outcome == 'failure'
        name: Slack notification on failure
        uses: ./.github/actions/slack_failure_notification
        with:
          webhook_url: ${{ secrets.SLACK_NOTIFICATIONS }}
          message: "Datamart integration tests failure"

  create_pr_to_main:
    needs: [ run_dbt ]
    # Run even though the `run_dbt` job might be skipped:
    if: |
      always() &&
      (needs.run_dbt.result == 'success' || needs.run_dbt.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: develop

      - name: Sync with main on success
        uses: ./.github/actions/create_merge_pr
        id: sync_with_main
        with:
          gh_token: ${{ secrets.GH_COMMIT_KEY }}
          destination: "main"

      ##########################################################################
      # Slack Notification
      ##########################################################################
      - if: failure() && steps.sync_with_main.outcome == 'failure'
        name: Slack notification on PR merge failure
        uses: ./.github/actions/slack_failure_notification
        with:
          webhook_url: ${{ secrets.SLACK_NOTIFICATIONS }}
          message: "Creating merge PR of develop into main failed"
